version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ruralshield
      POSTGRES_USER: ruralshield
      POSTGRES_PASSWORD: ruralshield_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    environment:
      PORT: "8000"
      DATABASE_URL: "postgresql+psycopg://ruralshield:ruralshield_dev@db:5432/ruralshield"
      JWT_SECRET: "dev-change-me"
      FIELD_ENC_KEY: "dev-change-me-to-32chars-minimum"
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  pgdata:

