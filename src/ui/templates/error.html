<!doctype html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ i18n.page_title_error }}</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="container">
    <header>
      <div class="top-row">
        <div>
          <div class="eyebrow">{{ i18n.title }}</div>
          <h1>{{ i18n.error_title }}</h1>
          <p class="muted">{{ i18n.error_subtitle }}</p>
        </div>
        <div class="header-actions">
          <form class="lang-form" method="get" action="/">
            <label for="lang">{{ i18n.lang_label }}</label>
            <select id="lang" name="lang" onchange="this.form.submit()">
              {% for item in langs %}
                <option value="{{ item.code }}" {% if item.code == lang %}selected{% endif %}>{{ item.label }}</option>
              {% endfor %}
            </select>
          </form>
        </div>
      </div>
    </header>

    <section class="card">
      <p class="muted small">{{ i18n.error_hint }}</p>
      <p class="muted small">Path: <code>{{ path }}</code></p>
      <pre class="code-block">{{ error }}</pre>
      <div class="actions">
        <a class="button secondary" href="/?lang={{ lang }}">{{ i18n.back_to_home }}</a>
        <a class="button" href="/customer/login?lang={{ lang }}">{{ i18n.customer_login_cta }}</a>
      </div>
      <p class="muted small" style="margin-top:12px;">Build: <code>{{ build_id }}</code></p>
      <p class="muted small">Debug log: <code>data/ui_errors.log</code></p>
    </section>
  </main>
</body>
</html>
