<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ event_title }} - RuralShield</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="container">
    <header>
      <div class="top-row">
        <div>
          <h1>{{ event_title }}</h1>
          <p>Append-only audit chain log</p>
        </div>
        <form action="/audit/events" method="get" class="lang-form">
          <label for="lang">{{ i18n.lang_label }}</label>
          <select id="lang" name="lang" onchange="this.form.submit()">
            {% for item in langs %}
            <option value="{{ item.code }}" {% if item.code == lang %}selected{% endif %}>{{ item.label }}</option>
            {% endfor %}
          </select>
        </form>
      </div>
    </header>

    <section class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>{{ i18n.time }}</th>
              <th>Event Type</th>
              <th>Log ID</th>
            </tr>
          </thead>
          <tbody>
            {% for row in events %}
            <tr>
              <td>{{ row.created_at }}</td>
              <td>{{ row.event_type }}</td>
              <td class="mono">{{ row.log_id }}</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </section>

    <section class="actions">
      <a href="/?lang={{ lang }}" class="button secondary">{{ i18n.back_dashboard }}</a>
    </section>
  </main>
</body>
</html>
