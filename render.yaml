services:
  - type: web
    name: ruralshield
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8000"
      - key: RURALSHIELD_COMBINED
        value: "1"
      - key: RURALSHIELD_API_MOUNT_PATH
        value: "/api"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FIELD_ENC_KEY
        sync: false
